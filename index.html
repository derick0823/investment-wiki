<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資研究入口 - Wiki Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-primary: #f8fafc;
            --text-secondary: #94a3b8; --accent-color: #e65100;
            --success: #22c55e; --danger: #ef4444; --neutral: #3b82f6; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary); line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        
        /* Landing Page Styles */
        .landing-container {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .wizard-card {
            background-color: var(--card-bg); padding: 3rem; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 500px;
            border: 1px solid var(--border); text-align: center;
        }
        .wizard-card h1 { margin-bottom: 2rem; font-size: 2rem; background: linear-gradient(to right, #fff, var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .step-group { margin-bottom: 1.5rem; text-align: left; }
        .step-label { display: block; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; }
        .wizard-select {
            width: 100%; background-color: #0f172a; color: #fff; border: 1px solid var(--border);
            padding: 1rem; border-radius: 12px; font-size: 1.1rem; outline: none; transition: border-color 0.3s;
        }
        .wizard-select:focus { border-color: var(--accent-color); }
        .enter-btn {
            width: 100%; padding: 1rem; margin-top: 1rem; border-radius: 12px; border: none;
            background-color: var(--accent-color); color: #fff; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: transform 0.2s, background-color 0.2s;
        }
        .enter-btn:hover { background-color: #ff6d00; transform: translateY(-2px); }
        .enter-btn:disabled { background-color: var(--border); cursor: not-allowed; transform: none; opacity: 0.5; }

        /* Dashboard Styles */
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
        .filters { display: flex; gap: 1rem; }
        .nav-select { background-color: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        .back-home { font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; margin-bottom: 1rem; display: inline-block; }
        .back-home:hover { color: var(--accent-color); }

        /* Sections & Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--accent-color); position: relative; }
        .verify-link { position: absolute; top: 1rem; right: 1rem; font-size: 0.7rem; background: var(--border); padding: 2px 6px; border-radius: 4px; color: var(--text-secondary); opacity: 0.6; }
        .verify-link:hover { opacity: 1; color: var(--accent-color); }
        .kpi-label { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; }
        .kpi-value { font-size: 1.5rem; font-weight: 700; }
        .kpi-subvalue { font-size: 0.8rem; margin-top: 0.5rem; font-weight: 600; }
        .section { margin-bottom: 4rem; }
        .section-title { font-size: 1.4rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
        .section-title::before { content: ""; display: inline-block; width: 6px; height: 1.4rem; background-color: var(--accent-color); border-radius: 2px; }
        .revenue-section { display: flex; align-items: center; gap: 4rem; background-color: var(--card-bg); padding: 2.5rem; border-radius: 20px; margin-bottom: 3rem; border: 1px solid var(--border); }
        .pie-chart { width: 200px; height: 200px; border-radius: 50%; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .pie-chart::after { content: ""; position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; background-color: var(--card-bg); border-radius: 50%; }
        .legend { display: flex; flex-direction: column; gap: 1rem; flex: 1; }
        .legend-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .legend-label { display: flex; align-items: center; gap: 0.75rem; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }
        .legend-value { font-weight: 700; display: flex; flex-direction: column; align-items: flex-end; }
        .yoy-badge { font-size: 0.7rem; font-weight: 600; margin-top: 0.2rem; }
        .outlook-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .outlook-card { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .outlook-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .outlook-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-up { background-color: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
        .status-down { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .status-neutral { background-color: rgba(59, 130, 246, 0.1); color: var(--neutral); border: 1px solid var(--neutral); }
        .insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .insight-card { background-color: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); transition: all 0.3s; position: relative; }
        .outlook-banner { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--accent-color); padding: 2.5rem; border-radius: 20px; display: flex; flex-wrap: wrap; gap: 4rem; }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-neutral { color: var(--neutral); }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 1rem; } .revenue-section { flex-direction: column; gap: 2rem; } .outlook-grid { grid-template-columns: 1fr; } }
    </style>
</head>

        function App() {

            const params = new URLSearchParams(window.location.search);
            const initialTicker = params.get("ticker") || "";
            const initialYear = params.get("year") || "";
            const initialQuarter = params.get("quarter") || "";
            const initialView = (initialTicker && initialYear && initialQuarter) ? "dashboard" : "landing";

            const [view, setView] = React.useState(initialView);
            const [ticker, setTicker] = React.useState(initialTicker);
            const [year, setYear] = React.useState(initialYear);
            const [quarter, setQuarter] = React.useState(initialQuarter);

            // 當狀態改變時更新 URL，但不刷新頁面
            React.useEffect(() => {
                const newParams = new URLSearchParams();
                if (ticker) newParams.set("ticker", ticker);
                if (year) newParams.set("year", year);
                if (quarter) newParams.set("quarter", quarter);
                
                const newUrl = window.location.pathname + (newParams.toString() ? "?" + newParams.toString() : "");
                window.history.replaceState({ path: newUrl }, "", newUrl);
            }, [ticker, year, quarter]);

            const company = ticker ? wikiData[ticker] : null;
            const availableYears = company ? Object.keys(company.years) : [];
            const availableQuarters = company && year ? Object.keys(company.years[year]) : [];

                let currentPos = 0;
                const colors = ['var(--accent-color)', '#3b82f6', '#94a3b8', '#fbbf24', '#a855f7'];
                const stops = segments.map((s, i) => {
                    const start = currentPos;
                    currentPos += s.value;
                    return `${colors[i % colors.length]} ${start}% ${currentPos}%`;
                });
                return `conic-gradient(${stops.join(', ')})`;
            };

            const getLegendColor = (i) => ['var(--accent-color)', '#3b82f6', '#94a3b8', '#fbbf24', '#a855f7'][i % 5];

                                    {Object.keys(wikiData).map(t => <option key={t} value={t}>{wikiData[t].name} ({t})</option>)}

                            </div>

                            {ticker && (

                                    <span className="step-label">第二步：選擇年份</span>

                                    </select>
                                </div>
                            )}

                                    <select className="wizard-select" value={quarter} onChange={e => setQuarter(e.target.value)}>
                                        <option value="">請選擇季度...</option>
                                        {availableQuarters.map(q => <option key={q} value={q}>{q}</option>)}
                                    </select>
                                </div>
                            )}

                            <button className="enter-btn" disabled={!ticker || !year || !quarter} onClick={() => setView("dashboard")}>
                                進入分析儀表板
                            </button>
                        </div>
                    </div>
                );
            }

            const data = company.years[year][quarter];

            return (
                <div className="dashboard-container" style={{"--accent-color": company.color}}>
                    <div className="back-home" onClick={() => setView("landing")}>← 返回首頁選擇其他公司</div>
                    <header className="header">
                        <h1>{company.name} 研究儀表板</h1>
                        <div className="filters">
                            <select className="nav-select" value={ticker} onChange={e => { setTicker(e.target.value); setYear(""); setQuarter(""); setView("landing"); }}>
                                {Object.keys(wikiData).map(t => <option key={t} value={t}>{wikiData[t].name} ({t})</option>)}
                            </select>
                            <select className="nav-select" value={year} onChange={e => { setYear(e.target.value); setQuarter(""); }}>
                                {Object.keys(company.years).map(y => <option key={y} value={y}>{y} 年</option>)}
                            </select>
                            <select className="nav-select" value={quarter} onChange={e => setQuarter(e.target.value)}>
                                {Object.keys(company.years[year] || {}).map(q => <option key={q} value={q}>{q}</option>)}
                            </select>
                        </div>
                    </header>

                    <section className="section">
                        <h2 className="section-title">{year} {quarter} 核心指標 (NTD)</h2>
                        <div className="kpi-grid">
                            {data.metrics.map((m, i) => (
                                <div key={i} className="kpi-card">
                                    <Verify link={m.wikiLink} />
                                    <div className="kpi-label">{m.label}</div>
                                    <div className="kpi-value">{m.value}</div>
                                    <div className={`kpi-subvalue trend-${m.trend}`}>{m.subValue}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">營收業務組成與年度表現 (YoY)</h2>
                        <div className="revenue-section">
                            <div className="pie-chart" style={{ background: calculateGradient(data.revenueSegments) }}></div>
                            <div className="legend">
                                {data.revenueSegments.map((s, i) => (
                                    <div key={i} className="legend-item">
                                        <div className="legend-label">
                                            <span className="dot" style={{ backgroundColor: getLegendColor(i) }}></span>
                                            <span>{s.label}</span>
                                        </div>
                                        <div className="legend-value">
                                            <span>{s.value}% ({s.amount}) <a href={`wiki/${s.wikiLink}.md`} style={{fontSize:'0.6rem', color:'var(--accent-color)'}}>[驗證]</a></span>
                                            <span className={`yoy-badge trend-${s.trend}`}>YoY: {s.yoy}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">業務別未來展望</h2>
                        <div className="outlook-grid">
                            {data.segmentOutlooks.map((s, i) => (
                                <div key={i} className="outlook-card">
                                    <Verify link={s.wikiLink} />
                                    <div className="outlook-header">
                                        <span className="outlook-label">{s.label}</span>
                                        <span className={`outlook-status status-${s.expectation}`}>{s.expectation === 'up' ? '成長' : s.expectation === 'down' ? '衰退' : '持平'}</span>
                                    </div>
                                    <p className="outlook-desc">{s.description}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">年度財務目標里程碑 (NTD)</h2>
                        <div className="outlook-banner">
                            {data.outlook.map((o, i) => (
                                <div key={i} style={{flex: 1, minWidth: '240px', position: 'relative'}}>
                                    <Verify link={o.wikiLink} />
                                    <div className="kpi-label">{o.label}</div>
                                    <div className="kpi-value">{o.value}</div>
                                    {o.subValue && <div className="kpi-subvalue trend-neutral">{o.subValue}</div>}
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">關鍵研究專案</h2>
                        <div className="insight-grid">
                            {[...data.growthEngines, ...data.strategicTrends].map((item, i) => (
                                <div key={i} className="insight-card">
                                    <Verify link={item.wikiLink} />
                                    <h3>{item.title}</h3>
                                    <p>{item.content}</p>
                                    <div className="insight-source">來源：{item.source}</div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
